<!DOCTYPE html>

    <title>Maria Amélia Campos</title>

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <!-- FUNDO COM FOTO -->
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <main class="container">

        <!-- LOGO -->
        <img src="./assets/img/logo.png" alt="Maria Amélia" class="logo-main">

        <!-- TEXTO -->

        <!-- SOCIAL -->
        <section class="social-section">
            <a href="https://www.instagram.com/mariaamelia.DF/" target="_blank" class="btn instagram">Instagram</a>

           <a href="https://www.instagram.com/mariaamelia.DF/" target="_blank" class="btn instagram">Empresária</a> www.instagram.com/mariaameliadoces
            <a href="https://beacons.ai/mariaameliadoces" target="_blank" class="btn beacons">Beacons</a>
        </section>

        <!-- FORM -->
        <section class="form-section">
            <h2>Deixe sua Mensagem</h2>

            <form>
                <input type="email" placeholder="Seu e-mail (opcional)">
                <textarea placeholder="Sua mensagem..." required></textarea>
                <button type="submit">Enviar Mensagem</button>

    </main>
